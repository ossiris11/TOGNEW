    <circle cx="130" cy="160" r="54" fill="none" stroke="url(#accent)" stroke-width="12"/>
    <circle cx="130" cy="160" r="18" fill="#00e5ff"/>
    <path d="M84 286H176" stroke="rgba(255,255,255,0.5)" stroke-width="10" stroke-linecap="round"/>
