<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TOGOSHOL - игровые ПК и сборка компьютеров на заказ</title>
  <desc id="desc">Готовые игровые ПК и кастомные сборки в Великом Новгороде.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050506"/>
      <stop offset="0.52" stop-color="#07151c"/>
      <stop offset="1" stop-color="#111026"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.52" stop-color="#2b7dff"/>
      <stop offset="1" stop-color="#8b5cff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="930" cy="130" r="190" fill="#00e5ff" opacity="0.16" filter="url(#glow)"/>
  <circle cx="1030" cy="505" r="250" fill="#8b5cff" opacity="0.18" filter="url(#glow)"/>
  <circle cx="310" cy="505" r="210" fill="#00a9ff" opacity="0.12" filter="url(#glow)"/>
  <g opacity="0.2">
    <path d="M0 110H1200M0 220H1200M0 330H1200M0 440H1200M0 550H1200" stroke="#fff"/>
    <path d="M150 0V630M300 0V630M450 0V630M600 0V630M750 0V630M900 0V630M1050 0V630" stroke="#fff"/>
  </g>
  <g transform="translate(88 82)">
    <rect x="0" y="0" width="274" height="56" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
    <text x="28" y="37" fill="#e9fbff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">TOG-PC.RU</text>
  </g>
  <text x="88" y="235" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900">TOGOSHOL</text>
  <text x="88" y="315" fill="url(#accent)" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="900">Игровые ПК на заказ</text>
  <text x="88" y="390" fill="rgba(255,255,255,0.76)" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Готовые сборки, кастомные компьютеры,</text>
  <text x="88" y="435" fill="rgba(255,255,255,0.76)" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">стресс-тесты и настройка системы.</text>
  <text x="88" y="530" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Великий Новгород · доставка по России</text>
